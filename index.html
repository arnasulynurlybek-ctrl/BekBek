<!-- Твой исходный код сохраняется -->
<!-- Добавим пасхалки в конце скрипта -->
<script>
// ===== Пасхалки =====

// Пасхалка 1: нажми заголовок 5 раз
let headerClickCount = 0;
document.querySelector('header h1').addEventListener('click', () => {
    headerClickCount++;
    if(headerClickCount === 5){
        alert("🎉 Пасхалка №1: Ты кликал по заголовку 5 раз!");
        headerClickCount = 0;
    }
});

// Пасхалка 2: три быстрых клика на картинку в галерее
let galleryClickTimes = [];
document.getElementById('imageContainer').addEventListener('click', () => {
    const now = Date.now();
    galleryClickTimes.push(now);
    // Оставляем только последние 3 клика
    if(galleryClickTimes.length > 3) galleryClickTimes.shift();
    if(galleryClickTimes.length === 3 && (galleryClickTimes[2] - galleryClickTimes[0]) < 1000) {
        alert("😎 Пасхалка №2: Ты нашел секретное изображение!");
        galleryClickTimes = [];
    }
});

// Пасхалка 3: комбинация клавиш "key + s + e + c + r + e + t"
let secretCode = ['k','e','y','s','e','c','r','e','t'];
let userInput = [];
document.addEventListener('keydown', (e) => {
    userInput.push(e.key.toLowerCase());
    if(userInput.length > secretCode.length) userInput.shift();
    if(JSON.stringify(userInput) === JSON.stringify(secretCode)){
        alert("🕵️‍♂️ Пасхалка №3: Ты ввел секретный код!");
        userInput = [];
    }
});

// Пасхалка 4: нажать на "Мини-игра: Угадай число"
document.querySelector('#game h2').addEventListener('click', () => {
    alert("🎮 Пасхалка №4: Ты открыл секрет мини-игры!");
});

// Пасхалка 5: ввод числа 42 в угадай число
document.getElementById('guess').addEventListener('input', () => {
    const guess = Number(document.getElementById('guess').value);
    if(guess === 42){
        document.getElementById('gameMessage').textContent = "✨ Пасхалка №5: Ответ на главный вопрос жизни, вселенной и всего такого!";
    }
});
</script>
